<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f101c" />
      <stop offset="100%" stop-color="#1A1B2F" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#B8D935" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#B8D935" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#bg-grad)" />
  <rect width="1920" height="1080" fill="url(#grid)" />
  <rect width="1920" height="1080" fill="url(#glow)" />
  
  <!-- Giant Typography -->
  <text x="50%" y="50%" font-family="system-ui, -apple-system, sans-serif" font-size="300" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" opacity="0.05" letter-spacing="40">DADDY</text>
  
  <!-- Subtitle -->
  <text x="50%" y="65%" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#B8D935" opacity="0.4" letter-spacing="15">SECURE MESSAGING</text>
</svg>
