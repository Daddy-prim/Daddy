    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 512 512' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M190 140 L 380 260 L 120 380 L 200 270 Z' fill='%23B8D935' stroke='%23B8D935' stroke-width='40' stroke-linejoin='round' stroke-linecap='round' /%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Century+Gothic&display=swap');
      
      /* Century Gothic isn't a standard Google Font, so we use a close alternative or system stack */
      body {
        font-family: 'Century Gothic', 'Tw Cen MT', Futura, 'Muli', sans-serif;
        overscroll-behavior-y: none; /* Prevents pull-to-refresh on mobile */
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Hide scrollbar for cleaner UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* iOS Safe Area handling */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
    <script>
      window.process = { env: {} };
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              nexus: {
                midnight: '#1A1B2F', 
                mint: '#2AF598',     
                slate: '#F1F4F9',    
                coral: '#FF6B6B',    
                
                // Mapping for compatibility
                dark: '#1A1B2F',     
                card: '#252640',     
                primary: '#1A1B2F',  
                accent: '#2AF598',   
                surface: '#F1F4F9',
                
                'midnight-hover': '#23243E',
                'mint-hover': '#22C57A',
              }
            },
            fontFamily: {
              sans: ['"Century Gothic"', 'Tw Cen MT', 'Futura', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.3s ease-out',
              'fade-in-down': 'fadeInDown 0.3s ease-out',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
</head>
  <body class="bg-nexus-slate dark:bg-nexus-dark text-slate-900 dark:text-slate-100 transition-colors duration-200 h-full overflow-hidden fixed w-full select-none">
    <div id="root" class="h-full w-full"></div>
  <script type="module" src="/index.tsx"></script>
